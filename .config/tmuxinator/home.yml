project_name: home
name: "¾░ŗ£ Home"
# enable_pane_titles: true
on_project_first_start:
  - wd traefik
  - docker compose up -d
  - cd -
windows:
  - config:
      root: ~/.config/yadm
      layout: main-horizontal
      panes:
        - editor: [v]
        - yadm: [cd && while true; do clear && yadm st; sleep 60; done]
        - docker: [while true; do lazydocker; sleep 5; done]
        - htop: [htop]
  - journal:
      root: ~/.Notes
      layout: main-horizontal
      panes: [journal]
